		<link rel="stylesheet" href="css/swiper.min.css" />

									</ul>
									<div class="header-bottom__icons"></div>
								</div>
							</div>
							<div class="header-bottom__right">
								<div data-da=".header-bottom__menu, 768, first" class="header-search">
									<div class="header-search__input">
										<input autocomplete="off" type="text" name="form[]" placeholder="Поиск">
										<div class="header-search__close">
											<img src="img/icons/close.svg" alt="">
										</div>
									</div>
									<button type="button" class="header-search__button">
										<img src="img/icons/search.svg" alt="">

								</div>
